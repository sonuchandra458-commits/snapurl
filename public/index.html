<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapURL — Free URL Shortener</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

  <nav class="navbar">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
      SnapURL
    </div>
    <button id="themeBtn" class="theme-btn">🌙 Dark</button>
  </nav>

  <main class="main">

    <div class="hero">
      <h1>Shorten. Share. Track.</h1>
      <p>Turn long URLs into short links — with click tracking, QR codes &amp; history.</p>
    </div>

    <div class="card">
      <div class="field">
        <label class="field-label">Long URL <span class="req">*</span></label>
        <input type="url" id="urlInput" class="inp"
               placeholder="https://example.com/your/very/long/link/goes/here"
               autocomplete="off" />
      </div>

      <div class="row2">
        <div class="field">
          <label class="field-label">Custom alias <span class="opt">(optional)</span></label>
          <div class="alias-box">
            <span class="alias-pre">snap/</span>
            <input type="text" id="aliasInput" class="inp alias-inp"
                   placeholder="my-brand" maxlength="20" />
          </div>
        </div>
        <div class="field">
          <label class="field-label">Expires in</label>
          <select id="expirySelect" class="inp">
            <option value="never">Never</option>
            <option value="1">1 day</option>
            <option value="7">7 days</option>
            <option value="30">30 days</option>
          </select>
        </div>
      </div>

      <button id="shortenBtn" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"/><path d="M12 5l7 7-7 7"/>
        </svg>
        Shorten URL
      </button>

      <div id="errBox" class="err-box hidden"></div>
    </div>

    <div id="resultCard" class="card result-card hidden">
      <p class="result-top">✅ Your short link is ready!</p>
      <div class="result-row">
        <a id="resultLink" class="result-link" href="#" target="_blank"></a>
        <div class="result-btns">
          <button id="copyBtn"  class="btn btn-sm">📋 Copy</button>
          <button id="qrToggle" class="btn btn-sm">QR Code</button>
        </div>
      </div>
      <div class="orig-row">
        <span class="orig-label">Original →</span>
        <span id="origUrl" class="orig-url"></span>
      </div>
      <div id="badgeRow" class="badge-row"></div>
      <div id="qrArea" class="qr-area hidden">
        <div id="qrBox"></div>
        <button id="qrDownload" class="btn btn-sm">⬇ Download QR</button>
      </div>
    </div>

    <section class="history">
      <div class="history-top">
        <h2>
          Your Links
          <span id="linkCount" class="count-badge">0</span>
        </h2>
        <input type="text" id="searchBox" class="inp search-inp"
               placeholder="🔍  Search links…" />
      </div>
      <div id="historyList">
        <div id="emptyState" class="empty-state">
          <div style="font-size:48px;margin-bottom:12px">🔗</div>
          <p>No links yet — shorten one above!</p>
        </div>
      </div>
    </section>

  </main>

  <footer class="footer">
    <p>SnapURL · Built with Node.js · Express · MongoDB · Vanilla JS</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
